<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card - Stage 0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <article data-testid="test-todo-card" class="todo-card">
        <header>
            <div class="card-header-top">
                <label for="todo-complete" class="visually-hidden">Mark as complete</label>
                <input type="checkbox" id="todo-complete" class="todo-complete" data-testid="test-todo-complete-toggle">
                <h2 class="todo-title" data-testid="test-todo-title">Design New Onboarding Flow</h2>
                <span class="priority-badge high" data-testid="test-todo-priority"
                    aria-label="Priority: High">High</span>
            </div>
            <p class="todo-description" data-testid="test-todo-description">Redesign the user onboarding screens</p>
            <div class="card-meta">
                <time datetime="2026-04-16T18:18:00Z" data-testid="test-todo-due-date">📅 Due Apr 16, 2026</time>
                <span data-testid="test-todo-time-remaining" aria-live="polite">⏱ <span
                        id="time-remaining">Calculating</span></span>
                <span data-testid="test-todo-status" id="todo-status">🔵 <span id="status-text">In
                        Progress</span></span>
                <ul class="todo-tags" data-testid="test-todo-tags" role="list">
                    <li data-testid="test-todo-tag-work">🏢 Work</li>
                    <li data-testid="test-todo-tag-urgent">🔥 Urgent</li>
                    <li data-testid="test-todo-tag-design">🎨 Design</li>
                </ul>
            </div>
        </header>
        <div class="action-buttons">
            <button data-testid="test-todo-edit-button" aria-label="Edit task" onclick="handleEdit()">✏️ Edit</button>
            <button data-testid="test-todo-delete-button" aria-label="Delete task" onclick="handleDelete()">🚮
                Delete</button>
        </div>
    </article>
    <script src="script.js"></script>
</body>

</html>
